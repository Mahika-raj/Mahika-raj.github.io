<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mahika Raj</title>
  <!-- Real uploaded Sweezy .ani cursor used through extracted animated frames. -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Butterfly+Kids&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:        #ffffff;
      --ink:       #111111;
      --home-bg:   #0e0e0e;
      --home-text: #ffffff;
      --hand: "Butterfly Kids", cursive;
      --mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --panel-w: clamp(340px, 50vw, 520px);
      --name-size: clamp(48px, 12vw, 110px);
      --soft-ease: cubic-bezier(.25, .8, .25, 1);

      /* pixel-art cursor (hotspot at the tip: 6 1) */
      --cursor: none;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; cursor: var(--cursor); }
    html, body { height: 100%; background: var(--home-bg); overflow: hidden; }

    .reveal-wrap {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      overflow: hidden;
      background: transparent;
    }

    #home {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: var(--home-bg);
      opacity: 0;
      transition: opacity 720ms cubic-bezier(.16,1,.3,1);
    }
    #home.settled { opacity: 1; }
    #stars { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0; transition: opacity 1300ms ease; }
    #stars.lit { opacity:1; }

    #codeScreen {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--mono);
      transition:
        background-color 2300ms cubic-bezier(.16, 1, .3, 1),
        color 2300ms cubic-bezier(.16, 1, .3, 1),
        opacity 1200ms ease;
    }
    #codeScreen.dark {
      background: var(--home-bg);
      color: var(--home-text);
    }
    #codeScreen.gone { opacity: 0; }

    /* ===================== UNIFIED LOADING + TERMINAL ===================== */
    #loader {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition:
        opacity 720ms cubic-bezier(.16,1,.3,1),
        transform 720ms cubic-bezier(.16,1,.3,1),
        filter 720ms cubic-bezier(.16,1,.3,1);
    }
    #loader.hide {
      opacity: 0;
      transform: none;
      filter: blur(3px);
      pointer-events: none;
    }

    .stage {
      position: relative;
      width: min(var(--panel-w), calc(100vw - 42px));
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading {
      position: absolute;
      right: clamp(10px, 2vw, 20px);
      bottom: calc(100% + 7px);
      white-space: nowrap;
      font-family: var(--hand);
      color: var(--ink);
      font-size: clamp(44px, 8.2vw, 64px);
      line-height: .86;
      transform: rotate(-2deg);
      z-index: 2;
    }

    .terminal-loader {
      width: 100%;
      min-height: 194px;
      border: 2.5px solid var(--ink);
      border-radius: 24px;
      padding: 21px 24px 23px;
      background: rgba(255,255,255,.90);
      box-shadow: 10px 10px 0 rgba(17,17,17,.92);
      filter: url(#rough);
    }

    .terminal-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border: 1.5px solid var(--ink);
      border-radius: 999px;
      background: var(--bg);
    }
    .terminal-title {
      margin-left: 7px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .02em;
      opacity: .55;
      filter: none;
    }

    .cmd-stack { min-height: 76px; }

    /* NPM text popup copied from the 9_code_jump code-line behavior. */
    .cmd-line {
      display: block;
      font-family: var(--mono);
      font-size: clamp(13px, 1.55vw, 15px);
      line-height: 1.7;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(5px);
      transition:
        opacity 750ms ease,
        transform 750ms cubic-bezier(.22,1,.36,1);
    }
    .cmd-line.show {
      opacity: 1;
      transform: translateY(0);
    }
    .muted { opacity: .55; }
    .ok { font-weight: 700; }

    .bar { position: relative; width: 100%; height: 34px; margin-top: 12px; }
    .outline {
      position: absolute; inset: 0;
      border: 2.5px solid var(--ink);
      border-radius: 999px;
    }
    .inner {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 10px;
    }
    .segs {
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .seg {
      flex: 1;
      height: 18px;
      background: transparent;
      border-radius: 4px;
      transform: rotate(var(--r)) scaleY(.82);
      transform-origin: center;
      transition:
        background-color 190ms ease,
        transform 420ms cubic-bezier(.16,1,.3,1);
    }
    .seg.on {
      background: var(--ink);
      transform: rotate(var(--r)) scaleY(1.04);
    }



    /* ===================== SOFTER WHITE -> BLACK CROSSFADE ===================== */
    /* Instead of changing the whole screen color at once, a black layer fades in
       over the white code screen. This removes the flash/pop between loader and rain. */
    #codeScreen {
      isolation: isolate;
      background: var(--bg) !important;
      transition: color 1600ms cubic-bezier(.16, 1, .3, 1) !important;
    }
    #codeScreen::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      background: var(--home-bg);
      opacity: 0;
      transition: opacity 1600ms cubic-bezier(.16, 1, .3, 1);
      pointer-events: none;
    }
    #codeScreen.dark {
      background: var(--bg) !important;
      color: var(--home-text);
    }
    #codeScreen.dark::before {
      opacity: 1;
    }
    #codeScreen > * {
      z-index: 1;
    }

    /* ===================== CODE FIELD ===================== */
    .code-lane {
      position: absolute;
      left: -44vw;
      width: 188vw;
      top: var(--y);
      display: flex;
      gap: clamp(28px, 4.7vw, 70px);
      align-items: center;
      font-family: var(--mono);
      font-size: clamp(10px, 1.2vw, 13px);
      line-height: 1;
      white-space: nowrap;
      color: rgba(17,17,17,.20);
      opacity: 0;
      transform: translate3d(var(--start-x), 0, 0);
      filter: blur(2px);
      transition:
        opacity 760ms cubic-bezier(.16, 1, .3, 1),
        color 4200ms cubic-bezier(.16, 1, .3, 1),
        filter 760ms cubic-bezier(.16, 1, .3, 1);
      animation: laneSlide var(--dur) linear var(--delay) infinite;
      will-change: transform, opacity, color;
    }
    #codeScreen.dark .code-lane { color: rgba(255,255,255,.28); }
    .code-lane.show { opacity: var(--alpha); filter: blur(0); }
    .code-lane.focus {
      opacity: .42;
      filter: blur(.65px);
      transition:
        opacity 760ms cubic-bezier(.16,1,.3,1),
        filter 760ms cubic-bezier(.16,1,.3,1);
    }
    .code-lane.fade {
      opacity: 0;
      filter: blur(4px);
      transition:
        opacity 2400ms cubic-bezier(.16, 1, .3, 1),
        filter 2400ms cubic-bezier(.16, 1, .3, 1);
    }
    .code-pill { display: inline-block; opacity: .9; }

    @keyframes laneSlide {
      from { transform: translate3d(var(--start-x), 0, 0); }
      to   { transform: translate3d(var(--end-x), 0, 0); }
    }

    /* ===================== SMOOTHER NAME COMPILE ===================== */
    .name-assembly {
      position: fixed;
      inset: 0;
      z-index: 24;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transform: none;
      filter: blur(8px);
      transition:
        opacity 780ms cubic-bezier(.16,1,.3,1),
        transform 780ms cubic-bezier(.16,1,.3,1),
        filter 780ms cubic-bezier(.16,1,.3,1);
    }
    .name-assembly.show {
      opacity: 1;
      transform: none;
      filter: blur(0);
    }
    .name-assembly.resolve {
      opacity: 0;
      transform: none;
      filter: blur(4px);
      transition:
        opacity 720ms cubic-bezier(.16,1,.3,1),
        transform 720ms cubic-bezier(.16,1,.3,1),
        filter 720ms cubic-bezier(.16,1,.3,1);
    }

    .compile-wrap {
      position: relative;
      width: max-content;
      max-width: calc(100vw - 24px);
      padding: 0 10px;
      display: grid;
      place-items: center;
      isolation: isolate;
    }

    .source-band {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(740px, calc(100vw - 44px));
      height: clamp(60px, 8vw, 86px);
      transform: translate(-50%, -50%) scaleX(.70);
      opacity: 0;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.12);
      border-bottom: 1px solid rgba(255,255,255,.12);
      mask-image: linear-gradient(90deg, transparent, #000 16%, #000 84%, transparent);
      -webkit-mask-image: linear-gradient(90deg, transparent, #000 16%, #000 84%, transparent);
      transition:
        opacity 700ms cubic-bezier(.16,1,.3,1),
        transform 900ms cubic-bezier(.16,1,.3,1),
        height 900ms cubic-bezier(.16,1,.3,1);
      z-index: -1;
    }
    .source-band span {
      position: absolute;
      left: -25%;
      width: 150%;
      font-family: var(--mono);
      font-size: clamp(9px, .95vw, 12px);
      letter-spacing: .08em;
      color: rgba(255,255,255,.38);
      white-space: nowrap;
      animation: bandSlide var(--speed) linear var(--delay) infinite;
    }
    .source-band span:nth-child(1) { top: 8px;  --speed: 9600ms;  --delay: -2600ms; }
    .source-band span:nth-child(2) { top: 29px; --speed: 11600ms; --delay: -5400ms; opacity: .72; }
    .source-band span:nth-child(3) { top: 50px; --speed: 10400ms; --delay: -1200ms; opacity: .54; }

    .name-assembly.show .source-band {
      opacity: .92;
      transform: translate(-50%, -50%) scaleX(1);
      height: clamp(70px, 8.8vw, 94px);
    }
    .name-assembly.lock .source-band {
      opacity: 0;
      transform: translate(-50%, -50%) scaleX(.58);
      height: 2px;
      transition:
        opacity 720ms cubic-bezier(.16,1,.3,1),
        transform 720ms cubic-bezier(.16,1,.3,1),
        height 720ms cubic-bezier(.16,1,.3,1);
    }

    @keyframes bandSlide {
      from { transform: translateX(0); }
      to   { transform: translateX(28%); }
    }

    .compiled-name {
      position: relative;
      display: flex;
      align-items: baseline;
      justify-content: center;
      font-family: var(--hand);
      font-size: var(--name-size);
      line-height: 1;
      white-space: nowrap;
      text-shadow: none;
    }

    .glyph {
      position: relative;
      display: inline-block;
      color: rgba(255,255,255,0);
      opacity: 0;
      transform: none;
      filter: blur(10px);
      animation: none;
      will-change: opacity, filter, color;
    }
    .glyph.space { width: .28em; }

    .glyph::before {
      content: attr(data-char);
      position: absolute;
      inset: 0;
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.98) 0 2px,
          rgba(255,255,255,.34) 2px 4px,
          transparent 4px 7px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.72) 0 8px,
          rgba(255,255,255,.22) 8px 13px,
          transparent 13px 18px
        );
      background-size: 100% 15px, 260px 100%;
      background-position: 0 0, 0 0;
      clip-path: inset(100% 0 0 0);
      opacity: .94;
      filter: none;
      animation: codeTexture 900ms linear infinite;
      pointer-events: none;
    }

    .glyph::after {
      content: attr(data-char);
      position: absolute;
      inset: 0;
      color: rgba(255,255,255,.98);
      opacity: 0;
      transform: none;
      filter: blur(4px);
      pointer-events: none;
    }

    .name-assembly.show .glyph {
      animation: glyphRise 1280ms cubic-bezier(.16,1,.3,1) forwards;
      animation-delay: calc(70ms * var(--i));
    }
    .name-assembly.show .glyph::before {
      animation:
        codeTexture 900ms linear infinite,
        glyphCodeReveal 1180ms cubic-bezier(.16,1,.3,1) forwards;
      animation-delay: 0ms, calc(70ms * var(--i));
    }
    .name-assembly.lock .glyph::before {
      opacity: 0;
      clip-path: inset(0 0 0 0);
      transition: opacity 740ms cubic-bezier(.16,1,.3,1);
    }
    .name-assembly.lock .glyph::after {
      opacity: 1;
      transform: none;
      filter: blur(0);
      transition:
        opacity 800ms cubic-bezier(.16,1,.3,1),
        filter 800ms cubic-bezier(.16,1,.3,1);
    }

    .compile-sweep {
      position: absolute;
      left: -6%;
      right: -6%;
      top: 50%;
      height: 2px;
      transform: translateY(-50%) scaleX(0);
      transform-origin: left center;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.62), transparent);
      opacity: 0;
      filter: blur(.2px);
      z-index: 2;
    }
    .name-assembly.show .compile-sweep {
      animation: sweepLine 1500ms cubic-bezier(.16,1,.3,1) 260ms forwards;
    }

    @keyframes glyphRise {
      0%   { opacity: 0; transform: scale(.965); filter: blur(10px); color: rgba(255,255,255,0); }
      45%  { opacity: .86; filter: blur(3px); }
      100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); color: rgba(255,255,255,.08); }
    }
    @keyframes glyphCodeReveal {
      0%   { clip-path: inset(100% 0 0 0); opacity: 0; }
      22%  { opacity: 1; }
      100% { clip-path: inset(0 0 0 0); opacity: .94; }
    }
    @keyframes codeTexture {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 0 15px, 260px 0; }
    }
    @keyframes sweepLine {
      0%   { transform: translateY(-50%) scaleX(0); opacity: 0; }
      18%  { opacity: 1; }
      72%  { opacity: .85; }
      100% { transform: translateY(-50%) scaleX(1); opacity: 0; }
    }



    /* ===================== ULTRA SMOOTH NAME REVEAL OVERRIDES ===================== */
    #home {
      transition: opacity 850ms var(--soft-ease);
    }

    #codeScreen {
      transition:
        background-color 2300ms var(--soft-ease),
        color 2300ms var(--soft-ease);
    }

    #loader {
      transition:
        opacity 650ms var(--soft-ease),
        filter 650ms var(--soft-ease);
    }
    #loader.hide {
      transform: none;
      filter: blur(2px);
    }

    .code-lane {
      transition:
        opacity 760ms var(--soft-ease),
        color 4200ms var(--soft-ease),
        filter 760ms var(--soft-ease);
    }
    .code-lane.focus {
      opacity: .36;
      filter: blur(.45px);
      transition:
        opacity 850ms var(--soft-ease),
        filter 850ms var(--soft-ease);
    }
    .code-lane.fade {
      opacity: 0;
      filter: blur(3px);
      transition:
        opacity 2400ms var(--soft-ease),
        filter 2400ms var(--soft-ease);
    }

    .name-assembly {
      filter: blur(7px);
      transition:
        opacity 800ms var(--soft-ease),
        filter 800ms var(--soft-ease);
    }
    .name-assembly.resolve {
      filter: blur(3px);
      transition:
        opacity 760ms var(--soft-ease),
        filter 760ms var(--soft-ease);
    }
    .name-assembly.lock .source-band {
      opacity: 0;
      transform: translate(-50%, -50%) scaleX(.88);
      height: 2px;
      transition:
        opacity 760ms var(--soft-ease),
        transform 760ms var(--soft-ease),
        height 760ms var(--soft-ease);
    }

    .smooth-name {
      position: relative;
      display: grid;
      transform: none !important;
      scale: 1 !important;
      place-items: center;
      font-family: var(--hand);
      font-size: var(--name-size);
      line-height: 1;
      white-space: nowrap;
      text-shadow: none;
      isolation: isolate;
    }

    .smooth-name-layer,
    .smooth-name-layer::before {
      grid-area: 1 / 1;
      display: block;
      white-space: nowrap;
    }

    .name-ghost {
      color: rgba(255,255,255,.10);
      -webkit-text-stroke: .45px rgba(255,255,255,.18);
      opacity: 0;
      filter: blur(10px);
      transition:
        opacity 850ms var(--soft-ease),
        filter 850ms var(--soft-ease);
    }

    .name-code-fill,
    .name-final-fill,
    .name-sheen {
      color: transparent;
    }

    .name-code-fill::before,
    .name-final-fill::before,
    .name-sheen::before {
      content: attr(data-text);
    }

    .name-code-fill::before {
      color: transparent;
      -webkit-background-clip: text;
      background-clip: text;
      background-image:
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,.98) 0 2px,
          rgba(255,255,255,.42) 2px 4px,
          transparent 4px 8px
        ),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.78) 0 9px,
          rgba(255,255,255,.24) 9px 15px,
          transparent 15px 21px
        );
      background-size: 100% 18px, 280px 100%;
      background-position: 0 0, 0 0;
      opacity: 0;
      filter: blur(4px);
      clip-path: inset(0 100% 0 0);
      animation: codeTextureSmooth 1200ms linear infinite;
      transition:
        clip-path 1050ms var(--soft-ease),
        opacity 850ms var(--soft-ease),
        filter 760ms var(--soft-ease);
    }

    .name-final-fill::before {
      color: rgba(255,255,255,.98);
      opacity: 0;
      filter: blur(4px);
      text-shadow: none;
      transition:
        opacity 780ms var(--soft-ease),
        filter 780ms var(--soft-ease);
    }

    .name-sheen::before {
      display: none;
      opacity: 0;
      animation: none;
      filter: none;
    }

    .name-assembly.show .name-ghost {
      opacity: .22;
      filter: blur(0);
    }
    .name-assembly.show .name-code-fill::before {
      opacity: .92;
      filter: blur(0);
      clip-path: inset(0 0 0 0);
    }
    .name-assembly.show .name-sheen::before {
      animation: none;
      opacity: 0;
    }
    .name-assembly.lock .name-code-fill::before {
      opacity: 0;
      filter: blur(3px);
      transition:
        opacity 650ms var(--soft-ease),
        filter 650ms var(--soft-ease);
    }
    .name-assembly.lock .name-final-fill::before {
      opacity: 1;
      filter: blur(0);
    }

    .home-content {
      filter: blur(8px);
      transition:
        opacity 850ms var(--soft-ease),
        filter 850ms var(--soft-ease);
    }
    .home-sub {
      transition:
        opacity 1350ms var(--soft-ease) 520ms;
    }

    @keyframes codeTextureSmooth {
      from { background-position: 0 0, 0 0; }
      to   { background-position: 0 18px, 280px 0; }
    }

    @keyframes softSheen {
      0%   { background-position: 130% 0; opacity: 0; }
      22%  { opacity: .78; }
      82%  { opacity: .68; }
      100% { background-position: -30% 0; opacity: 0; }
    }

    /* ===================== FINAL HOME ===================== */
    .home-content {
      position: fixed;
      inset: 0;
      z-index: 23;
      text-align: center;
      color: var(--home-text);
      opacity: 0;
      transform: none;
      filter: blur(6px);
      transition:
        opacity 850ms var(--soft-ease),
        filter 850ms var(--soft-ease);
      pointer-events: none;
    }
    .home-content.show {
      opacity: 1;
      transform: none;
      filter: blur(0);
      pointer-events: auto;
    }
    .home-name {
      position: absolute;
      transform-origin: center center;
      scale: 1 !important;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: max-content;
      max-width: calc(100vw - 24px);
      font-family: var(--hand);
      font-size: var(--name-size);
      line-height: 1;
      text-shadow: none;
    }
    .home-sub  {
      position: absolute;
      left: 50%;
      top: calc(50% + clamp(54px, 9.2vw, 96px));
      transform: translateX(-50%);
      width: max-content;
      max-width: calc(100vw - 24px);
      font-family: var(--hand);
      font-size: clamp(20px, 4.5vw, 30px);
      opacity: 0;
      margin-top: 0;
      transition:
        opacity 650ms var(--soft-ease) 180ms;
    }
    .home-content.show .home-sub {
      opacity: .7;
      transform: translateX(-50%);
    }

    .code-caret {
      display: inline-block;
      width: .62em;
      height: 1.05em;
      background: currentColor;
      transform: translateY(2px);
      animation: caretBlink .8s steps(1) infinite;
    }
    @keyframes caretBlink { 50% { opacity: 0; } }



    /* ===================== HARD LOCK: MAHIKA RAJ NEVER MOVES ===================== */
    .name-assembly,
    .name-assembly.show,
    .name-assembly.lock,
    .name-assembly.resolve {
      position: fixed !important;
      inset: 0 !important;
      display: block !important;
      align-items: unset !important;
      justify-content: unset !important;
      transform: none !important;
      scale: 1 !important;
      translate: none !important;
      rotate: none !important;
      filter: none !important;
      pointer-events: none !important;
      transition: opacity 420ms var(--soft-ease) !important;
    }

    .name-assembly { opacity: 0 !important; }
    .name-assembly.show { opacity: 1 !important; }
    .name-assembly.resolve { opacity: 0 !important; }

    .compile-wrap {
      position: fixed !important;
      left: 50% !important;
      top: 50% !important;
      width: max-content !important;
      max-width: calc(100vw - 24px) !important;
      padding: 0 !important;
      margin: 0 !important;

        name.className = 'smooth-name';

        codeScreen.innerHTML = '';
        codeScreen.classList.remove('dark');
        codeScreen.style.display = 'flex';

        // Smooth handoff: code starts beneath the loader first, then the black
        // screen eases in, so the white-to-black change stays soft.
        requestAnimationFrame(function () {
          spawnSlidingCode();
        });

        setTimeout(function () {
          loader.classList.add('hide');
        }, 120);

        setTimeout(function () {
          codeScreen.classList.add('dark');
        }, 322);

        setTimeout(function () {
          loader.style.display = 'none';
        }, 572);

        setTimeout(function () {
          home.classList.add('settled');
        }, 1066);

        setTimeout(function () {
          var lanes = codeScreen.querySelectorAll('.code-lane');
          for (var i = 0; i < lanes.length; i++) lanes[i].classList.add('focus');
        }, 962);

        setTimeout(function () {
          var lanes = codeScreen.querySelectorAll('.code-lane');
          for (var i = 0; i < lanes.length; i++) lanes[i].classList.add('gather');
        }, 702);

        setTimeout(function () {
          var lanes = codeScreen.querySelectorAll('.code-lane');
          for (var i = 0; i < lanes.length; i++) lanes[i].classList.remove('bright-code');
        }, 1400);

        var assembly = null;
        setTimeout(function () {
          assembly = createNameAssembly();
          requestAnimationFrame(function () {
            assembly.classList.add('show');
          });
        }, 1050);

        // Bring in the final clean title about 2s earlier, while the code is still running.
        setTimeout(function () {
          content.classList.add('show');
        }, 1200);

        setTimeout(function () {
          if (siteNav) siteNav.classList.add('show');
        }, 1350);

        // Name + nav are up; lock the title but KEEP the code raining behind.
        setTimeout(function () {
          if (assembly) assembly.classList.add('lock');
        }, 1700);

        // Let the code linger behind the name, then dissolve away gradually —
        // lane by lane — into clean dark.
        setTimeout(function () {
          var lanes = codeScreen.querySelectorAll('.code-lane');
          for (var i = 0; i < lanes.length; i++) {
            (function (ln, idx) {
              setTimeout(function () { ln.classList.add('fade'); }, idx * 45);
            })(lanes[i], i);
          }
        }, 4900);

        setTimeout(function () {
          if (assembly) assembly.classList.add('resolve');
        }, 2000);

        setTimeout(function () {
          var st = document.getElementById('stars'); if (st) st.classList.add('lit');
          codeScreen.classList.add('gone');
        }, 7100);

        setTimeout(function () {
          codeScreen.style.display = 'none';
          codeScreen.classList.remove('dark');
          codeScreen.classList.remove('gone');
          codeScreen.innerHTML = '';
        }, 8500);
      }

      if (reduce) {
        segs.forEach(function (s) { s.classList.add('on'); });
        loader.style.display = 'none';
        home.classList.add('settled');
        content.classList.add('show');
          if (siteNav) siteNav.classList.add('show');
        return;
      }

      var cmd1 = document.getElementById('cmd1');
      var cmd2 = document.getElementById('cmd2');
      var cmd3 = document.getElementById('cmd3');

      // NPM text popup timing is synced to the 3.5s loading bar.
      // Ready appears earlier now, so it holds longer before the handoff.
      setTimeout(function () { cmd1.classList.add('show'); }, 166);
      setTimeout(function () { cmd2.classList.add('show'); }, 520);
      setTimeout(function () { cmd3.classList.add('show'); }, 858);

      var start = null;
      var lastShow = -1;
      function frame(now) {
        if (start === null) start = now;
        var p = Math.min((now - start) / DURATION, 1);
        var show = p >= 1 ? N : Math.floor(p * N);
        if (show !== lastShow) {
          for (var i = 0; i < N; i++) segs[i].classList.toggle('on', i < show);
          lastShow = show;
        }
        if (p < 1) requestAnimationFrame(frame);
        else reveal();
      }
      requestAnimationFrame(frame);
    })();

    for(i=0;i<nodes.length;i++){var a=nodes[i],da=Math.hypot(a.x-mouse.x,a.y-mouse.y),near=mouse.on&&da<150;
      if(near){
        for(j=i+1;j<nodes.length;j++){var b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
          if(d<82){ctx.strokeStyle='rgba(176,168,230,'+(0.5*(1-d/82)*(1-da/150)).toFixed(2)+')';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
        ctx.strokeStyle='rgba(176,168,230,'+(0.4*(1-da/150)).toFixed(2)+')';ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(mouse.x,mouse.y);ctx.stroke();
      }
      var base=0.17*a.g;
      var br=near?Math.min(1,base+0.8*(1-da/150)):base;
      var rad=1.5+a.g*0.42+(near?0.5*(1-da/150):0);
      ctx.fillStyle='rgba(255,255,255,'+br.toFixed(2)+')';ctx.beginPath();ctx.arc(a.x,a.y,rad,0,6.28);ctx.fill();
    }
    raf=requestAnimationFrame(frame);
  }
  window.addEventListener('mousemove',function(e){mouse.x=e.clientX;mouse.y=e.clientY;mouse.on=true;});
  window.addEventListener('blur',function(){mouse.on=false;});
  size();window.addEventListener('resize',size);raf=requestAnimationFrame(frame);
})();
</script>
